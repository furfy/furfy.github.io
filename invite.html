<html>
	<head>
		<style>
			body
			{
				align-items: center;
				background-color: rgb(49, 51, 56);
				display: flex;
				height: 100%;
				justify-content: space-around;
				margin: 0;
				overflow: hidden;
				user-select: none;
			}
			#invite
			{
				display: block;
				background-color: rgb(88, 101, 242);
				border-radius: 3px;
				box-shadow: rgba(0, 0, 0, 0.2) 0px 2px 10px 0px;
				color: rgb(255, 255, 255);
				cursor: pointer;
				font-family: 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
				font-size: 16px;
				font-weight: 500;
				padding: 10px 48px 10px 48px;
				text-decoration: none;
				transition: background-color 170ms ease;
			}
			#invite:hover
			{
				background-color: rgb(71, 82, 196);
			}
			#invite:active
			{
				background-color: rgb(60, 69, 165);
			}
			#furfy
			{
				bottom: 0;
				display: block;
				height: 35%;
				pointer-events: none;
				position: absolute;
			}
	  </style>
	</head>
	<body>
		<a id="invite" draggable="false" href="https://discord.gg/QbuVGMErrX">Приглашение от Фурфи</a>
		<img id="furfy" src="resources/furfy.png" />
	</body>
</html>
